name: Publish forecast site

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: "2,17,32,47 * * * *"

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run tests
        run: PYTHONPATH=src python3 -m unittest discover -s tests -v

      - name: Build site
        run: PYTHONPATH=src python3 -m aemo_forecast.cli build --output-dir site

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
